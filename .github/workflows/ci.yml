name: CI

on:
  push:
  pull_request:

jobs:
  workflow-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.9'
      - run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.12

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.9'
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: webui/package-lock.json
      - run: npm ci
        working-directory: webui
      - run: npm run build
        working-directory: webui
      - run: rm -rf internal/server/dist && cp -r webui/dist internal/server/dist
      - run: mkdir -p dist
      - run: go test -coverprofile dist/coverage.out ./...
      - run: go tool cover -func dist/coverage.out
      - run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
      - name: Verify deploy drill evidence
        run: |
          go run ./cmd/mizan deploy drill --summary --out dist/staging-drill-summary.json
          go run ./cmd/mizan deploy drill verify --file dist/staging-drill-summary.json
      - uses: actions/upload-artifact@v7
        with:
          name: staging-drill-summary
          path: dist/staging-drill-summary.json

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: webui/package-lock.json
      - run: npm ci
        working-directory: webui
      - run: npm run lint
        working-directory: webui
      - run: npm run test:coverage
        working-directory: webui
      - run: npm run build
        working-directory: webui
      - run: npx playwright install --with-deps chromium
        working-directory: webui
      - run: npm run test:e2e
        working-directory: webui
      - run: npm audit --audit-level=low
        working-directory: webui

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: webui/package-lock.json
      - run: npm ci
        working-directory: webui
      - run: npm run build
        working-directory: webui
      - run: rm -rf internal/server/dist && cp -r webui/dist internal/server/dist
      - run: docker build --target runtime --build-arg VERSION=ci --build-arg COMMIT=${{ github.sha }} --build-arg DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)" -t mizan:ci .
      - uses: anchore/scan-action@v7.4.0
        with:
          image: mizan:ci
          fail-build: true
          severity-cutoff: high
      - run: docker build --target runtime-ssh --build-arg VERSION=ci --build-arg COMMIT=${{ github.sha }} --build-arg DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)" -t mizan:ssh-ci .
      - uses: anchore/scan-action@v7.4.0
        with:
          image: mizan:ssh-ci
          fail-build: true
          severity-cutoff: high
