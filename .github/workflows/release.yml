name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Version to embed when running manually, for example 0.1.5-dev
        required: false
        default: 0.1.5-dev

permissions:
  contents: write
  id-token: write

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.9'
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: webui/package-lock.json
      - run: npm ci
        working-directory: webui
      - run: npm run build
        working-directory: webui
      - run: rm -rf internal/server/dist && cp -r webui/dist internal/server/dist
      - name: Verify deploy drill evidence
        run: |
          mkdir -p dist
          go run ./cmd/mizan deploy drill --summary --out dist/staging-drill-summary.json
          go run ./cmd/mizan deploy drill verify --file dist/staging-drill-summary.json
      - name: Write production doctor report
        run: go run ./cmd/mizan doctor --home dist/doctor-home --production --json --out dist/production-doctor.json
      - uses: actions/upload-artifact@v7
        with:
          name: preflight-evidence
          path: |
            dist/staging-drill-summary.json
            dist/production-doctor.json

  build:
    needs: preflight
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.9'
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: webui/package-lock.json
      - uses: sigstore/cosign-installer@v3
      - run: npm ci
        working-directory: webui
      - run: npm run build
        working-directory: webui
      - run: rm -rf internal/server/dist && cp -r webui/dist internal/server/dist
      - name: Resolve build metadata
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="${{ github.event.inputs.version || '0.1.5-dev' }}"
          fi
          {
            echo "MIZAN_VERSION=${version}"
            echo "MIZAN_COMMIT=${GITHUB_SHA}"
            echo "MIZAN_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } >> "$GITHUB_ENV"
      - run: |
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 go build -trimpath \
            -ldflags="-s -w -X github.com/mizanproxy/mizan/internal/version.Version=${MIZAN_VERSION} -X github.com/mizanproxy/mizan/internal/version.Commit=${MIZAN_COMMIT} -X github.com/mizanproxy/mizan/internal/version.Date=${MIZAN_DATE}" \
            -o dist/mizan-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/mizan
      - run: cd dist && sha256sum mizan-${{ matrix.goos }}-${{ matrix.goarch }} > mizan-${{ matrix.goos }}-${{ matrix.goarch }}.sha256
      - run: cosign sign-blob --yes --output-signature dist/mizan-${{ matrix.goos }}-${{ matrix.goarch }}.sig --output-certificate dist/mizan-${{ matrix.goos }}-${{ matrix.goarch }}.pem dist/mizan-${{ matrix.goos }}-${{ matrix.goarch }}
      - uses: actions/upload-artifact@v7
        with:
          name: mizan-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/mizan-${{ matrix.goos }}-${{ matrix.goarch }}
            dist/mizan-${{ matrix.goos }}-${{ matrix.goarch }}.sha256
            dist/mizan-${{ matrix.goos }}-${{ matrix.goarch }}.sig
            dist/mizan-${{ matrix.goos }}-${{ matrix.goarch }}.pem

  publish:
    if: github.ref_type == 'tag'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          path: release-artifacts
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          notes_file="$(mktemp)"
          cat > "$notes_file" <<EOF
          Mizan ${version}

          Release artifacts include:
          - Linux, macOS, and Windows binaries
          - SHA-256 checksum files
          - Keyless Sigstore signatures
          - Sigstore signing certificates
          EOF
          mapfile -t files < <(find release-artifacts -type f | sort)
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "${files[@]}" --clobber
          else
            gh release create "$tag" "${files[@]}" --title "Mizan ${version}" --notes-file "$notes_file"
          fi

  verify:
    if: github.ref_type == 'tag'
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: sigstore/cosign-installer@v3
      - name: Verify published release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          ./scripts/verify-release.ps1 `
            -Tag "${env:GITHUB_REF_NAME}" `
            -Repository "${env:GITHUB_REPOSITORY}" `
            -VerifySignatures
